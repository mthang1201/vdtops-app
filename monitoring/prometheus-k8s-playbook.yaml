---
- name: Deploy Prometheus monitoring to Kubernetes
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    monitoring_namespace: monitoring
    manifest_dir: "{{ playbook_dir }}"

  tasks:
    - name: Ensure monitoring namespace exists
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ monitoring_namespace }}"

    - name: Apply Prometheus config map
      kubernetes.core.k8s:
        state: present
        src: "{{ manifest_dir }}/prometheus-configmap.yaml"

    - name: Apply Prometheus deployment
      kubernetes.core.k8s:
        state: present
        src: "{{ manifest_dir }}/prometheus-deployment.yaml"

    - name: Apply Prometheus NodePort service
      kubernetes.core.k8s:
        state: present
        src: "{{ manifest_dir }}/prometheus-service.yaml"
