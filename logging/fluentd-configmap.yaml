apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentd-config
  namespace: logging
data:
  fluent.conf: |
    <source>
      @type tail
      path /var/log/containers/*.log
      pos_file /fluentd/pos/containers.log.pos
      tag kubernetes.*
      read_from_head true
      refresh_interval 5

      <parse>
        @type regexp
        expression /^(?<cri_time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[FP]) (?<log>.*)$/
      </parse>
    </source>

    <filter kubernetes.**>
      @type kubernetes_metadata
    </filter>

    <filter kubernetes.**>
      @type grep
      <regexp>
        key $.kubernetes.namespace_name
        pattern /^dev$/
      </regexp>
      <regexp>
        key $.kubernetes.labels.component
        pattern /^(api|web)$/
      </regexp>
      <regexp>
        key log
        pattern /^\{/
      </regexp>
    </filter>

    <filter kubernetes.**>
      @type parser
      key_name log
      reserve_data true
      remove_key_name_field true
      emit_invalid_record_to_error false

      <parse>
        @type json
      </parse>
    </filter>

    <match kubernetes.**>
      @type elasticsearch
      host elasticsearch.logging.svc.cluster.local
      port 9200
      logstash_format true
      logstash_prefix vdtops-logs
      include_tag_key true
      tag_key fluentd_tag
      reconnect_on_error true
      reload_connections false
      request_timeout 30s
    </match>
