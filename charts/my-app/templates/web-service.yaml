apiVersion: v1
kind: Service
metadata:
  name: {{ include "my-app.fullname" . | default .Chart.Name }}-web
  labels:
    app: {{ include "my-app.name" . | default .Chart.Name }}
    component: web
spec:
  type: {{ .Values.web.service.type }}
  ports:
    - port: {{ .Values.web.service.port }}
      targetPort: {{ .Values.web.containerPort }}
      protocol: TCP
      name: http
  selector:
    app: {{ include "my-app.name" . | default .Chart.Name }}
    component: web
