apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "my-app.fullname" . | default .Chart.Name }}-web
  labels:
    app: {{ include "my-app.name" . | default .Chart.Name }}
    component: web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app: {{ include "my-app.name" . | default .Chart.Name }}
      component: web
  template:
    metadata:
      labels:
        app: {{ include "my-app.name" . | default .Chart.Name }}
        component: web
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
      containers:
        - name: web
          image: "{{ .Values.web.image }}:{{ .Values.web.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{ .Values.web.containerPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
